{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<article class="card">
  <h1>{{ title }}</h1>
  <p>Chemin: <strong>{{ page_path }}</strong></p>
  <h2>Liens sortants</h2>
  {% if links %}
    <ul>
      {% for link in links %}
      <li><a href="{{ link }}">{{ link }}</a></li>
      {% endfor %}
    </ul>
  {% else %}
    <p>Aucun lien sortant.</p>
  {% endif %}
  <p><a href="/">Retour accueil</a></p>
</article>
{% endblock %}
