name: Daily Data Release

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily archive zip
        env:
          EXPORT_DAYS: "30"
        run: |
          python scripts/export_daily_archive.py

      - name: Resolve release metadata
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          DATE_UTC="$(date -u +%Y-%m-%d)"
          TAG="data-${DATE_UTC}"
          TITLE="Data ${DATE_UTC}"
          ZIP_PATH="$(ls -1t reports/daily_reports_*d_*.zip | head -n 1)"
          SHA_PATH="${ZIP_PATH}.sha256"

          sha256sum "${ZIP_PATH}" > "${SHA_PATH}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP_PATH}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA_PATH}" >> "$GITHUB_OUTPUT"

      - name: Create or update release with zip and checksum
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.title }}
          artifacts: ${{ steps.vars.outputs.zip }},${{ steps.vars.outputs.sha }}
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          body: |
            Daily automated data export.
            Archive generated from crawler honeypot reports.
            Includes SHA256 checksum file for integrity verification.
